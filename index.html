<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAS - Heart Lyrics</title>
    <style>
        body { background-color: #000; color: #fff; margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        #start-btn { padding: 15px 40px; font-size: 22px; cursor: pointer; background: none; color: #ff3366; border: 2px solid #ff3366; border-radius: 50px; transition: 0.4s; }
        #start-btn:hover { background: #ff3366; color: #000; }
        
        #heart-wrapper { display: none; position: relative; width: 500px; height: 500px; }
        .lyrics-container { position: absolute; width: 100%; height: 100%; display: block; }
        .char { position: absolute; font-size: 10px; color: #ff3366; text-shadow: 0 0 2px #ff4d4d; opacity: 0; transition: opacity 0.5s; font-weight: bold; }
    </style>
</head>
<body>

    <button id="start-btn">تحبني ؟</button>

    <div id="heart-wrapper">
        <div class="lyrics-container" id="heart-box"></div>
    </div>

    <audio id="cas-song">
        <source src="touch.mp3" type="audio/mpeg">
    </audio>

    <script>
        const btn = document.getElementById('start-btn');
        const audio = document.getElementById('cas-song');
        const heartBox = document.getElementById('heart-box');
        const wrapper = document.getElementById('heart-wrapper');

        // الكلمات المحددة من المقطع
        const text = "couldn't say you didn't want me then... when we were lying in my bed that night... you were acting like I couldn't help myself... suddenly you wanted to just be friends... I'm so-so-so-so took a shower so you couldn't hear me... you know that I take heart-to-know... the home is breaking... you were sleeping or just faking... sleeping all over... every time we touch... bleeding me over... every time we touch... feeling so lonely... 'cause it's not enough... missing you only... ever since we fell in love... ";
        const lyricsText = text.repeat(10); // تكرار لملء مساحة القلب

        btn.addEventListener('click', () => {
            btn.style.display = 'none';
            wrapper.style.display = 'block';
            audio.play();

            const chars = lyricsText.split("");
            let charIndex = 0;
            const rows = 35; // عدد الأسطر لرسم القلب
            const cols = 70; // عدد الأعمدة

            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    // تحويل الإحداثيات لمعادلة القلب الرياضية
                    let nx = (x - cols / 2) / (cols / 3);
                    let ny = (rows / 2 - y) / (rows / 4);
                    
                    // معادلة فحص إذا كانت النقطة داخل حدود القلب
                    if (Math.pow(nx*nx + ny*ny - 1, 3) - nx*nx * ny*ny*ny <= 0) {
                        if (charIndex < chars.length) {
                            const span = document.createElement('span');
                            span.className = 'char';
                            span.innerText = chars[charIndex];
                            
                            // توزيع الحروف بمسافات ثابتة (مستقر)
                            span.style.left = (x * 7) + 'px'; 
                            span.style.top = (y * 12) + 'px';
                            
                            heartBox.appendChild(span);
                            
                            // توقيت الظهور المتسلسل
                            const currentIdx = charIndex;
                            setTimeout(() => {
                                span.style.opacity = '1';
                            }, currentIdx * 15);
                            
                            charIndex++;
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
